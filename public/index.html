<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Silver Price Forecaster — Redirecting</title>
  <meta http-equiv="refresh" content="3;url=https://silverprice.streamlit.app/" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0e0;
    }
    .card {
      text-align: center;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      backdrop-filter: blur(12px);
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.6rem; margin-bottom: 0.5rem; color: #fff; }
    p { font-size: 1rem; line-height: 1.6; color: #b0b0b0; margin-bottom: 1.5rem; }
    a.button {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #FF4B4B;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }
    a.button:hover { background: #e03e3e; }
    .note { font-size: 0.85rem; color: #888; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#x1FA99;</div>
    <h1>Silver Price Forecaster</h1>
    <p>AI-powered silver futures price predictions with Prophet &amp; XGBoost.</p>
    <p>You will be redirected to the live app in a few seconds.</p>
    <a class="button" href="https://silverprice.streamlit.app/">Open the App</a>
    <p class="note">Hosted on <a href="https://streamlit.io/" style="color:#FF4B4B;">Streamlit Cloud</a></p>
  </div>
</body>
</html>
